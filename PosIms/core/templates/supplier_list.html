{% extends 'base.html' %}

{% block title %}Suppliers{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0 fw-bold">Suppliers</h1>
    <a href="{% url 'supplier_create' %}" class="btn btn-outline-primary">Add New Supplier</a>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="table mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Contact</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for s in suppliers %}
                <tr>
                    <td>{{ s.id }}</td>
                    <td>{{ s.name }}</td>
                    <td>{{ s.contact|default:'-' }}</td>
                    <td>
                        <a href="{% url 'supplier_history' s.id %}" class="btn btn-sm btn-primary">History</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="text-center">No suppliers found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
